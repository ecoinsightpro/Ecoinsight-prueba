<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  @keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes cardReveal{from{transform:rotate(-3deg) translateY(22px) scale(0.94);opacity:0}to{transform:rotate(-3deg) translateY(0) scale(1);opacity:1}}
  @keyframes cardFloat{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(-3deg) translateY(-9px)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .ha1{animation:slideUp .6s ease-out both}
  .ha2{animation:slideUp .65s .08s ease-out both}
  .ha3{animation:slideUp .65s .16s ease-out both}
  .ha4{animation:slideUp .6s .24s ease-out both}
  .ha5{animation:slideUp .6s .32s ease-out both}
  .dash-card{animation:cardReveal .85s .3s ease-out both,cardFloat 5.5s 1.2s ease-in-out infinite}
  .hero-dash{animation:slideUp .8s .4s cubic-bezier(.16,1,.3,1) both}
  @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .dash-float{animation:cardReveal2 .8s .3s cubic-bezier(.16,1,.3,1) both, floatY 6s 1.1s ease-in-out infinite}
  @keyframes cardReveal2{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes barWave{0%,100%{transform:scaleY(.74)}50%{transform:scaleY(1)}}
  @keyframes scanX{0%{left:-46px}100%{left:100%}}
  @keyframes shimmer{0%{transform:translateX(-30px)}55%,100%{transform:translateX(320px)}}

  /* hero aurora — subtle drifting brand-color light, modern feel */
  .aurora{position:absolute;border-radius:50%;filter:blur(72px);will-change:transform}
  .aurora-1{top:-130px;right:7%;width:460px;height:460px;opacity:.16;animation:drift1 19s ease-in-out infinite}
  .aurora-2{bottom:-180px;left:-70px;width:540px;height:540px;opacity:.12;animation:drift2 24s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-42px,38px) scale(1.12)}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(52px,-30px) scale(1.08)}}

  /* WhatsApp floating button entrance */
  @keyframes waPop{0%{opacity:0;transform:translateY(20px) scale(.6)}60%{transform:translateY(0) scale(1.08)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .ei-wa{animation:waPop .6s .8s cubic-bezier(.16,1,.3,1) both;transition:transform .2s}

  ::-webkit-scrollbar{width:7px;height:7px}
