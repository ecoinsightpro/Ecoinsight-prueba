<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;text-wrap:pretty}
  input,select,button,textarea{font-family:inherit}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}
  input:focus,select:focus{outline:none}
  img,svg{display:block;max-width:100%}

  @keyframes slideUp{from{transform:translateY(18px)}to{transform:translateY(0)}}
  @keyframes cardReveal{from{transform:rotate(-3deg) translateY(22px) scale(0.94)}to{transform:rotate(-3deg) translateY(0) scale(1)}}
  @keyframes cardFloat{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(-3deg) translateY(-9px)}}

  .ha1{animation:slideUp .6s ease-out}
  .ha2{animation:slideUp .65s .08s ease-out}
  .ha3{animation:slideUp .65s .16s ease-out}
  .ha4{animation:slideUp .6s .24s ease-out}
  .ha5{animation:slideUp .6s .32s ease-out}
  .dash-card{animation:cardReveal .85s .3s ease-out forwards,cardFloat 5.5s 1.2s ease-in-out infinite}

  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:3px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes flashNew{0%{background-color:rgba(77,184,122,.12)}100%{background-color:transparent}}
  .flash-new{animation:flashNew 2.5s ease-out}
</style>

<!-- ═══ HEADER ═══ -->
<script type="text/babel">
function EcoHeader({t, theme, setTheme}) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 28);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const nav = ['Plataforma','Calculadora','Noticias','Marketplace'];
  const logoBox = {background: t.dark ? 'rgba(255,255,255,.94)' : 'transparent', borderRadius:8, padding: t.dark ? '3px 4px' : 0, display:'flex', alignItems:'center'};
  return (
    <header style={{position:'fixed',top:0,left:0,right:0,zIndex:200,background:scrolled?t.bg+'F4':'transparent',backdropFilter:scrolled?'blur(18px)':'none',borderBottom:`1px solid ${scrolled?t.border:'transparent'}`,transition:'all .3s'}}>
      <div style={{maxWidth:1180,margin:'0 auto',padding:'0 32px',display:'flex',alignItems:'center',justifyContent:'space-between',height:66}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={logoBox}><img src="uploads/logo_file-1781309583515.png" alt="EcoInsight" style={{height:32,width:'auto'}}/></div>
          <span style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:800,fontSize:20,color:t.text,letterSpacing:'-.022em'}}>
            <span style={{color:t.accent}}>Eco</span>Insight
          </span>
        </div>
        <nav style={{display:'flex',gap:2}}>
          {nav.map(l => (
            <a key={l} href={l==='Calculadora'?'#calculadora':l==='Marketplace'?'#marketplace':l==='Noticias'?'#noticias':'#'}
              style={{color:t.textMuted,textDecoration:'none',fontSize:14,fontWeight:500,padding:'6px 11px',borderRadius:7,transition:'all .18s',fontFamily:'DM Sans,sans-serif'}}
              onMouseEnter={e=>{e.currentTarget.style.color=t.text;e.currentTarget.style.background=t.border}}
              onMouseLeave={e=>{e.currentTarget.style.color=t.textMuted;e.currentTarget.style.background='transparent'}}
            >{l}</a>
          ))}
        </nav>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{display:'flex',gap:5,alignItems:'center'}} title="Cambiar variación visual">
            {Object.values(window.THEMES).map(th => (
              <button key={th.id} onClick={()=>setTheme(th.id)} title={`${th.label} · ${th.tagline}`}
                style={{width:theme===th.id?22:10,height:10,borderRadius:5,background:th.dot,border:'none',cursor:'pointer',opacity:theme===th.id?1:.38,transition:'all .28s',padding:0}}
              />
            ))}
          </div>

        </div>
      </div>
    </header>
  );
}
window.EcoHeader = EcoHeader;
</script>

<!-- ═══ CALCULATOR ═══ -->
<script type="text/babel">
function EcoCalculator({t}) {
  const [country, setCountry] = React.useState('chile');
  const [industry, setIndustry] = React.useState('mineria');
  const [v, setV] = React.useState({diesel:'',gasolina:'',gnl:'',elec:'',vuelos:'',flete:''});
  const [open, setOpen] = React.useState('s1');
  const upd = k => e => setV({...v,[k]:e.target.value});
  const n = k => parseFloat(v[k])||0;
  const grids={chile:.315,peru:.274,colombia:.179,argentina:.319,brasil:.074,mexico:.452,latam:.319};
  const s1=(n('diesel')*2.68+n('gasolina')*2.31+n('gnl')*1.89)/1000;
  const s2=(n('elec')*(grids[country]||.319))/1000;
  const s3=(n('vuelos')*.255+n('flete')*.168)/1000;
  const tot=s1+s2+s3;
  const p=w=>tot>0?Math.max(1,Math.round(w/tot*100)):0;
  const gr=tot<10?{g:'A',c:t.positive}:tot<50?{g:'B',c:'#82C440'}:tot<200?{g:'C',c:'#C9BB1A'}:tot<500?{g:'D',c:t.warning}:tot<1000?{g:'E',c:'#D46A3A'}:{g:'F',c:t.critical};
  const iSel={width:'100%',background:t.surface,border:`1px solid ${t.border}`,color:t.text,borderRadius:8,padding:'10px 12px',fontSize:13,fontFamily:'DM Sans',cursor:'pointer'};
  const Field=({label,k,unit})=>(
    <div>
      <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5,fontFamily:'Plus Jakarta Sans'}}>{label}</div>
      <div style={{display:'flex',gap:6}}>
        <input type="number" min="0" value={v[k]} onChange={upd(k)} placeholder="0"
          style={{flex:1,background:t.surface,border:`1px solid ${t.border}`,color:t.text,borderRadius:8,padding:'10px 12px',fontSize:13,fontFamily:'DM Mono,monospace',outline:'none',transition:'border-color .2s'}}
          onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
        <span style={{padding:'10px',background:t.card,border:`1px solid ${t.border}`,borderRadius:8,color:t.textMuted,fontSize:11,fontFamily:'DM Mono',display:'flex',alignItems:'center',whiteSpace:'nowrap'}}>{unit}</span>
      </div>
    </div>
  );
  const Scope=({id,title,sub,color,val,children})=>(
    <div style={{border:`1px solid ${open===id?color+'55':t.border}`,borderRadius:12,overflow:'hidden',marginBottom:10,transition:'border-color .2s'}}>
      <button onClick={()=>setOpen(open===id?null:id)} style={{width:'100%',padding:'14px 18px',background:open===id?color+'13':t.surface,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',transition:'background .2s'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:8,height:8,borderRadius:'50%',background:color}}/>
          <div style={{textAlign:'left'}}>
            <div style={{fontSize:14,fontWeight:600,color:t.text,fontFamily:'Plus Jakarta Sans'}}>{title}</div>
            <div style={{fontSize:11,color:t.textMuted}}>{sub}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {val>0&&<span style={{fontSize:12,color,fontFamily:'DM Mono',fontWeight:600}}>{val.toFixed(1)} t</span>}
          <span style={{color:t.textMuted,transform:open===id?'rotate(180deg)':'none',transition:'transform .22s',display:'block'}}>▾</span>
        </div>
      </button>
      {open===id&&<div style={{padding:18,background:t.card,display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>{children}</div>}
    </div>
  );
  return (
    <section id="calculadora" style={{background:t.bg,padding:'96px 0',borderTop:`1px solid ${t.border}`}}>
      <div style={{maxWidth:1180,margin:'0 auto',padding:'0 32px'}}>
        <div style={{marginBottom:50}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,background:t.accentDim,border:`1px solid ${t.accent}35`,borderRadius:20,padding:'5px 14px',marginBottom:18}}>
            <span style={{color:t.accent,fontSize:11,fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',fontFamily:'Plus Jakarta Sans',whiteSpace:'nowrap'}}>GHG Protocol · Alcances 1 · 2 · 3</span>
          </div>
          <h2 style={{fontSize:44,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.1,marginBottom:14,letterSpacing:'-.022em'}}>Calculadora de<br/>Emisiones GEI</h2>
          <p style={{fontSize:17,color:t.textMuted,maxWidth:560,lineHeight:1.65,fontFamily:'DM Sans'}}>Mide la huella de carbono de tu empresa en tiempo real. Factores de emisión oficiales para Chile, Perú, Colombia, Argentina y más.</p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 355px',gap:32,alignItems:'start'}}>
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:18}}>
              {[['Sector / Industria','industry',setIndustry,industry,[['mineria','Minería'],['construccion','Construcción'],['agro','Agroindustria'],['manufactura','Manufactura'],['transporte','Transporte & Logística'],['servicios','Servicios & Consultoría']]],
                ['Factor red eléctrica','country',setCountry,country,[['chile','Chile · 0.315 kg/kWh'],['peru','Perú · 0.274 kg/kWh'],['colombia','Colombia · 0.179 kg/kWh'],['argentina','Argentina · 0.319 kg/kWh'],['brasil','Brasil · 0.074 kg/kWh'],['mexico','México · 0.452 kg/kWh'],['latam','LATAM prom. · 0.319 kg/kWh']]]
              ].map(([lbl,_,fn,val,opts])=>(
                <div key={lbl}>
                  <div style={{fontSize:10,color:t.textMuted,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5,fontFamily:'Plus Jakarta Sans'}}>{lbl}</div>
                  <select value={val} onChange={e=>fn(e.target.value)} style={iSel}>
                    {opts.map(([k,l])=><option key={k} value={k}>{l}</option>)}
                  </select>
                </div>
              ))}
            </div>
            <Scope id="s1" title="Alcance 1 · Emisiones Directas" sub="Combustión propia: instalaciones y vehículos" color={t.accent} val={s1}>
              <Field label="Diésel" k="diesel" unit="L/año"/>
              <Field label="Gasolina" k="gasolina" unit="L/año"/>
              <Field label="Gas natural" k="gnl" unit="m³/año"/>
              <div style={{gridColumn:'span 2',padding:'10px 14px',background:t.accent+'12',borderRadius:8,fontSize:12,color:t.textMuted,fontFamily:'DM Sans'}}>
                Factor diésel: <strong style={{color:t.accent,fontFamily:'DM Mono'}}>2.68</strong> · Gasolina: <strong style={{color:t.accent,fontFamily:'DM Mono'}}>2.31</strong> · GNL: <strong style={{color:t.accent,fontFamily:'DM Mono'}}>1.89</strong> kgCO₂e/unidad
              </div>
            </Scope>
            <Scope id="s2" title="Alcance 2 · Energía Comprada" sub="Electricidad, vapor y calor adquiridos" color={t.accent2} val={s2}>
              <div style={{gridColumn:'span 2'}}>
                <Field label="Consumo eléctrico" k="elec" unit="kWh/año"/>
                <div style={{marginTop:10,padding:'10px 14px',background:t.accent2+'12',borderRadius:8,fontSize:12,color:t.textMuted}}>
                  Factor red: <strong style={{color:t.accent2,fontFamily:'DM Mono'}}>{grids[country]||.319} kgCO₂e/kWh</strong> · País seleccionado: <strong style={{color:t.accent2}}>{country}</strong>
                </div>
              </div>
            </Scope>
            <Scope id="s3" title="Alcance 3 · Cadena de Valor" sub="Viajes de negocio y transporte de carga" color={t.warning} val={s3}>

  const shown=cat==='Todos'?visible:visible.filter(a=>a.cat===cat);
  const featured=shown[0], rest=shown.slice(1);
  const cc=a=>CAT_COLORS_NEWS[a.cat]||t.accent;
  const isNew=a=>(a.uid&&flashId===a.uid)||(!a.uid&&flashId===a.id);
  const Badge=({a,small})=>(
    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:small?8:12}}>
      <span style={{background:cc(a)+'22',color:cc(a),fontSize:small?9:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',padding:'2px 9px',borderRadius:20,fontFamily:'Plus Jakarta Sans'}}>{a.cat}</span>
      {isNew(a)&&<span style={{background:t.critical+'22',color:t.critical,fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:20,fontFamily:'Plus Jakarta Sans',animation:'pulse 1s 3'}}>● NUEVO</span>}
    </div>
  );
  return (
    <section id="noticias" style={{background:t.bg,padding:'96px 0',borderTop:`1px solid ${t.border}`}}>
      <div style={{maxWidth:1180,margin:'0 auto',padding:'0 32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:36,flexWrap:'wrap',gap:20}}>
          <div>
            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:t.critical+'15',border:`1px solid ${t.critical}35`,borderRadius:20,padding:'5px 14px',marginBottom:18}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:t.critical,display:'inline-block',animation:'pulse 1.8s infinite'}}/>
              <span style={{color:t.critical,fontSize:11,fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',fontFamily:'Plus Jakarta Sans',whiteSpace:'nowrap'}}>Noticias en vivo · ESG</span>
            </div>
            <h2 style={{fontSize:44,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.1,letterSpacing:'-.022em',marginBottom:10}}>Centro de<br/>Noticias Ambientales</h2>
            <p style={{fontSize:16,color:t.textMuted,fontFamily:'DM Sans',lineHeight:1.6}}>Actualización continua de noticias ESG, clima y regulación para LATAM.</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12,color:t.textMuted,fontFamily:'DM Mono'}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:t.positive,display:'inline-block',animation:'pulse 2s infinite'}}/>
              Actualizado hace {secs}s
            </div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap',justifyContent:'flex-end'}}>
              {CATS.map(c=>(
                <button key={c} onClick={()=>setCat(c)} style={{padding:'7px 14px',borderRadius:20,border:`1px solid ${cat===c?(CAT_COLORS_NEWS[c]||t.accent):t.border}`,background:cat===c?(CAT_COLORS_NEWS[c]||t.accent)+'18':'transparent',color:cat===c?(CAT_COLORS_NEWS[c]||t.accent):t.textMuted,fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .18s',fontFamily:'Plus Jakarta Sans'}}>{c}</button>
              ))}
            </div>
          </div>
        </div>
        {featured&&(
          <div style={{display:'grid',gridTemplateColumns:'1.55fr 1fr',gap:20,marginBottom:18}}>
            <div style={{background:isNew(featured)?t.surface:t.card,border:`1.5px solid ${isNew(featured)?cc(featured):t.border}`,borderRadius:16,padding:'28px',cursor:'pointer',transition:'all .35s',display:'flex',flexDirection:'column',justifyContent:'space-between',minHeight:240}}>
              <div><Badge a={featured}/>
                <h3 style={{fontSize:21,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.28,marginBottom:12}}>{featured.title}</h3>
                <p style={{fontSize:14,color:t.textMuted,lineHeight:1.62,fontFamily:'DM Sans'}}>{featured.excerpt}</p>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:20,paddingTop:16,borderTop:`1px solid ${t.border}`}}>
                <span style={{fontSize:11,color:t.textFaint,fontFamily:'DM Sans',fontWeight:600}}>{featured.src}</span>
                <span style={{fontSize:11,color:t.textFaint,fontFamily:'DM Mono'}}>hace {featured.time} · {featured.read} lectura</span>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              {rest.slice(0,2).map(a=>(
                <div key={a.uid||a.id} style={{background:t.card,border:`1px solid ${isNew(a)?cc(a):t.border}`,borderRadius:14,padding:'18px 20px',cursor:'pointer',transition:'all .35s',flex:1,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                  <div><Badge a={a} small/>
                    <h4 style={{fontSize:14,fontWeight:700,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.38,marginBottom:8}}>{a.title}</h4>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:t.textFaint,fontFamily:'DM Mono'}}>
                    <span>{a.src}</span><span>hace {a.time}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:36}}>
          {rest.slice(2,5).map(a=>(
            <div key={a.uid||a.id} style={{background:t.card,border:`1px solid ${isNew(a)?cc(a):t.border}`,borderRadius:14,padding:'16px 18px',cursor:'pointer',transition:'all .35s'}}>
              <Badge a={a} small/>
              <h4 style={{fontSize:13,fontWeight:700,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.38,marginBottom:8}}>{a.title}</h4>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:t.textFaint,fontFamily:'DM Mono'}}>
                <span>{a.src}</span><span>hace {a.time} · {a.read}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{textAlign:'center'}}>
          <a href="#" style={{display:'inline-flex',alignItems:'center',gap:8,color:t.accent,fontSize:15,fontWeight:600,fontFamily:'Plus Jakarta Sans',textDecoration:'none'}}>Ver todas las noticias ESG <span>→</span></a>
        </div>
      </div>
    </section>
  );
}
window.EcoNews = EcoNews;
</script>

<!-- ═══ FOOTER ═══ -->
<script type="text/babel">
function EcoFooter({t}) {
  const logoBox={background:t.dark?'rgba(255,255,255,.92)':'transparent',borderRadius:8,padding:t.dark?'3px 4px':0,display:'flex',alignItems:'center'};
  const links=[['Plataforma',['Calculadora GEI','Dashboard ESG','Biblioteca Ambiental','SaaS Empresarial']],['Recursos',['Noticias ESG','Marketplace Etsy','Plantillas Power BI','Casos de Éxito']],['Empresa',['Sobre EcoInsight','Blog','Contacto','Privacidad']]];
  return (
    <footer style={{background:t.bg,borderTop:`1px solid ${t.border}`,padding:'60px 0 36px'}}>
      <div style={{maxWidth:1180,margin:'0 auto',padding:'0 32px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:48,flexWrap:'wrap',gap:32}}>
          <div style={{maxWidth:240}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <div style={logoBox}><img src="uploads/logo_file-1781309583515.png" alt="" style={{height:28,width:'auto'}}/></div>
              <span style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:18,color:t.text,letterSpacing:'-.02em'}}><span style={{color:t.accent}}>Eco</span>Insight</span>
            </div>
            <p style={{fontSize:13,color:t.textMuted,lineHeight:1.7,fontFamily:'DM Sans'}}>Transformando datos ambientales en decisiones sostenibles.</p>
          </div>
          {links.map(([title,items])=>(
            <div key={title}>
              <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:t.textMuted,marginBottom:14,fontFamily:'Plus Jakarta Sans'}}>{title}</div>
              {items.map(l=>(
                <a key={l} href="#" style={{display:'block',fontSize:14,color:t.textMuted,textDecoration:'none',marginBottom:10,fontFamily:'DM Sans',transition:'color .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.color=t.text} onMouseLeave={e=>e.currentTarget.style.color=t.textMuted}>{l}</a>
              ))}
            </div>
          ))}
        </div>
        <div style={{borderTop:`1px solid ${t.border}`,paddingTop:22,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
          <span style={{fontSize:12,color:t.textFaint,fontFamily:'DM Sans'}}>© 2024 EcoInsight · Plataforma de inteligencia ambiental para LATAM</span>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {['GHG Protocol','GRI Standards','TCFD','WCAG 2.2 AA'].map(s=>(
              <span key={s} style={{fontSize:10,color:t.textFaint,background:t.card,border:`1px solid ${t.border}`,borderRadius:20,padding:'3px 10px',fontFamily:'Plus Jakarta Sans',fontWeight:600}}>{s}</span>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
}
window.EcoFooter = EcoFooter;
</script>

<!-- ═══ APP ═══ -->
<script type="text/babel">
function App() {
  const [theme, setTheme] = React.useState(() => localStorage.getItem('ei_theme') || 'navy');
  const t = window.THEMES[theme] || window.THEMES.navy;
  React.useEffect(() => {
    localStorage.setItem('ei_theme', theme);
    document.body.style.background = t.bg;
    document.body.style.color = t.text;
  }, [theme, t]);
  return (
    <div style={{background:t.bg,color:t.text,minHeight:'100vh',fontFamily:'DM Sans,sans-serif',transition:'background .35s,color .25s'}}>
      <EcoHeader t={t} theme={theme} setTheme={setTheme}/>
      <EcoHero t={t} theme={theme}/>
      <EcoNews t={t} theme={theme}/>
      <EcoCalculator t={t} theme={theme}/>
      <EcoMarketplace t={t} theme={theme}/>
      <EcoFooter t={t}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
