<script>
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +

        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');

            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;

            const d = diag0 * s / s0;
            this._view.s = s;

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no

    // stored pan toward zero.

      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';

      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;

      // crop; clearing the sidecar still falls through to src=.

      else { this._local = v; }

      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).

      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      const editable = !!(window.omelette && window.omelette.writeFile);

      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;

      if (!this.hasAttribute('data-reframe')) {

          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,

      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';

      if (url) {

        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();

        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');

    customElements.define('image-slot', ImageSlot);

      {cat:'ESG',        q:'ESG corporate sustainability'},
      {cat:'Energía',    q:'renewable energy Latin America'},
      {cat:'Regulación', q:'climate disclosure regulation'},
      {cat:'Minería',    q:'sustainable mining lithium'},
    ],
  };
  const gnewsUrl = (q,lang) => lang==='en'
    ? `https://news.google.com/rss/search?q=${encodeURIComponent(q+' when:21d')}&hl=en-US&gl=US&ceid=US:en`
    : `https://news.google.com/rss/search?q=${encodeURIComponent(q+' when:21d')}&hl=es-419&gl=CL&ceid=CL:es-419`;

  async function fetchText(url){
    for(const px of PROXIES){
      try{
        const c = new AbortController();
        const to = setTimeout(()=>c.abort(), 6000);
        const r = await fetch(px(url), {cache:'no-store', signal:c.signal});
        clearTimeout(to);
        if(!r.ok) continue;
        let txt = await r.text();
        // allorigins /get returns JSON {contents}
        if(txt[0]==='{' && /"contents"/.test(txt.slice(0,40))){ try{ txt = JSON.parse(txt).contents||txt; }catch(e){} }
        if(txt && txt.length>200 && /<(rss|feed|item|entry)/i.test(txt)) return txt;
      }catch(e){ /* try next proxy */ }
    }
    return null;
  }

  const TH_BY_CAT = {Minería:'carbon', Energía:'inventory', Regulación:'report', ESG:'esg', Clima:'plan'};
  function detectCat(title, fallback){
    const s = (title||'').toLowerCase();
    if(/miner|litio|cobre|faena|mining|copper/.test(s)) return 'Minería';
    if(/energ|renovab|solar|eólic|eolic|hidro|electric|combustible|petról|wind|energy|grid/.test(s)) return 'Energía';
    if(/\bley\b|norma|regula|decreto|\bsma\b|tribunal|fiscaliz|permiso|seia|disclosure|regulat|policy/.test(s)) return 'Regulación';
    if(/esg|sosteni|gobernanza|invers|corporate|governance|invest|finan/.test(s)) return 'ESG';
    return fallback || 'Clima';
  }
  function stripHtml(h){
    const d = document.createElement('div'); d.innerHTML = h||'';
    return (d.textContent||'').replace(/\s+/g,' ').trim();
  }
  function imgFrom(item){
    const tryAttr = (tag,attr)=>{ const els=item.getElementsByTagName(tag); for(let i=0;i<els.length;i++){ const u=els[i].getAttribute(attr); if(u) return u; } return null; };
    let u = tryAttr('media:content','url') || tryAttr('media:thumbnail','url');
    if(u && /^https?:/.test(u)) return u;
    const enc = item.getElementsByTagName('enclosure');
    for(let i=0;i<enc.length;i++){ const ty=enc[i].getAttribute('type')||''; if(ty.indexOf('image')===0){ const eu=enc[i].getAttribute('url'); if(eu) return eu; } }
    const ce = item.getElementsByTagName('content:encoded');
    const html = (ce.length? ce[0].textContent : '') + ' ' + (item.getElementsByTagName('description')[0]? item.getElementsByTagName('description')[0].textContent : '');
    const m = html.match(/<img[^>]+src=["']([^"']+\.(?:jpg|jpeg|png|webp)[^"']*)["']/i) || html.match(/<img[^>]+src=["']([^"']+)["']/i);
    if(m) return m[1];
    return null;
  }
  function relTime(d, lang){
    if(!d || isNaN(d)) return '';
    const min = Math.max(1, Math.round((Date.now()-d)/60000));
    if(min<60) return min + 'm';
    const h = Math.round(min/60); if(h<24) return h+'h';
    const days = Math.round(h/24); return days + (lang==='en'?'d':'d');
  }
  function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return Math.abs(h).toString(36); }

  function parseItems(xml, feedSrc, feedCat, lang){
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    if(doc.getElementsByTagName('parsererror').length) return [];
    let items = Array.from(doc.getElementsByTagName('item'));
    if(!items.length) items = Array.from(doc.getElementsByTagName('entry')); // Atom
    const out = [];
    for(const it of items){
      const get = tag => { const e=it.getElementsByTagName(tag)[0]; return e? e.textContent.trim() : ''; };
      const title = stripHtml(get('title'));
      if(!title) continue;
      // link: RSS <link>text, Atom <link href>
      let link = get('link');
      if(!link){ const la=it.getElementsByTagName('link')[0]; if(la) link = la.getAttribute('href')||''; }
      // Google News <source> tag carries the real outlet name
      const srcTag = it.getElementsByTagName('source')[0];
      const src = (srcTag && srcTag.textContent.trim()) || feedSrc;
      const pub = get('pubDate') || get('published') || get('updated');
      const dt = pub ? new Date(pub).getTime() : Date.now();
      const descRaw = get('description') || get('summary') || (it.getElementsByTagName('content:encoded')[0]||{}).textContent || '';
      const desc = stripHtml(descRaw).replace(/\s*Read more.*$/i,'');
      const cat = detectCat(title+' '+desc, feedCat);
      out.push({
        id: 'live-'+hash(link||title),
        live: true,
        cat, src, url: link,
        date: new Date(dt).toLocaleDateString(lang==='en'?'en-US':'es-CL',{day:'numeric',month:'short',year:'numeric'}),
        time: relTime(dt, lang),
        _ts: dt,
        read: Math.max(2, Math.min(8, Math.round(desc.length/700))) + ' min',
        th: TH_BY_CAT[cat] || 'esg',
        image: imgFrom(it),
        title:{es:title, en:title},
        summary:{es:(desc||title).slice(0,200)+((desc||'').length>200?'…':''), en:(desc||title).slice(0,200)+((desc||'').length>200?'…':'')},
        body:{es: desc?[desc]:[], en: desc?[desc]:[]},
      });
    }
    return out;
  }

  function dedupe(arr){
    const seen = new Set(), out = [];
    for(const a of arr){ const k=(a.title.es||'').toLowerCase().slice(0,60); if(seen.has(k)||!k) continue; seen.add(k); out.push(a); }
    return out;
  }

  // Public: returns array of card objects, or null if nothing loaded
  window.fetchEcoNews = async function(lang){
    lang = lang==='en' ? 'en' : 'es';
    let all = [];
    // 1) image-rich feeds first
    const feedResults = await Promise.allSettled(
      FEEDS[lang].map(f => fetchText(f.url).then(x => x ? parseItems(x, f.src, f.cat, lang) : []))
    );
    feedResults.forEach(r => { if(r.status==='fulfilled' && r.value) all = all.concat(r.value); });

    // 2) if too few with images, enrich with Google News (reliable links)
    const withImg = all.filter(a => a.image).length;
    if(all.length < 6 || withImg < 3){
      const gResults = await Promise.allSettled(
        GNEWS[lang].map(g => fetchText(gnewsUrl(g.q, lang)).then(x => x ? parseItems(x, 'Google News', g.cat, lang).map(it=>({...it, cat:g.cat, th:TH_BY_CAT[g.cat]})) : []))
      );
      gResults.forEach(r => { if(r.status==='fulfilled' && r.value) all = all.concat(r.value.slice(0,3)); });
    }

    all = dedupe(all).filter(a => a.url).sort((x,y)=> y._ts - x._ts);
    return all.length ? all.slice(0, 9) : null;
  };

  /* ── Etsy shop live sync (best-effort; real-time sync belongs in the
        Next.js backend via the Etsy Open API v3). Returns ordered listing
        ids currently published, or null if the fetch is blocked. ── */
  async function fetchRaw(url){
    for(const px of PROXIES){
      try{
        const c=new AbortController(); const to=setTimeout(()=>c.abort(),6000);
        const r=await fetch(px(url),{cache:'no-store',signal:c.signal}); clearTimeout(to);
        if(!r.ok) continue;
        let txt=await r.text();
        if(txt[0]==='{' && /"contents"/.test(txt.slice(0,40))){ try{ txt=JSON.parse(txt).contents||txt; }catch(e){} }
        if(txt && txt.length>500) return txt;
      }catch(e){}
    }
    return null;
  }
  window.fetchEtsyListings = async function(){
    const html = await fetchRaw('https://www.etsy.com/es/shop/EcoInsight');
    if(!html) return null;
    const re=/\/listing\/(\d+)\/([a-z0-9-]+)/g; const seen=new Set(); const out=[]; let m;
    while((m=re.exec(html))){ const id=m[1]; if(seen.has(id)) continue; seen.add(id); out.push({id, slug:m[2], url:`https://www.etsy.com/es/listing/${id}/${m[2]}`}); }
    return out.length ? out : null;
  };

  /* ── Marketplace live sync ──────────────────────────────────
     Returns an array of product objects pulled from Etsy, trying:
       1) a configured JSON feed (window.ETSY_FEED_URL) — the
          serverless connector in etsy-sync.md; this is the path
          that yields reliable, full data (price + image + stock).
       2) the Etsy shop RSS feed via CORS proxies.
       3) the shop HTML (listing ids/slugs) via CORS proxies.
     Returns null when every path is blocked (Etsy bot-protects
     direct browser access) so the UI keeps the verified catalog. */
  function normalizeJson(arr){
    return arr.map(p=>({
      listingId: String(p.listingId||p.listing_id||p.id||''),
      title: (p.title&&typeof p.title==='object') ? p.title : {es:(p.title||p.name||''), en:(p.title_en||p.title||p.name||'')},
      desc:  (p.desc&&typeof p.desc==='object') ? p.desc : (p.description?{es:p.description,en:p.description_en||p.description}:null),
      url:   (p.url&&typeof p.url==='object') ? p.url : {es:(p.url||p.es_url||''), en:(p.en_url||p.url||'')},
      image: p.image||p.img||(Array.isArray(p.images)&&p.images[0])||null,
      price: p.price!=null?parseFloat(p.price):null,
      oldPrice: p.oldPrice!=null?parseFloat(p.oldPrice):(p.old_price!=null?parseFloat(p.old_price):null),
      currencyRaw: p.currency||'EUR', fmt: p.fmt||'', cat: p.cat||p.category||'',
    })).filter(p=>p.listingId);
  }
  function parseEtsyXml(xml){
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    if(doc.getElementsByTagName('parsererror').length) return [];
    let items = Array.from(doc.getElementsByTagName('item'));
    if(!items.length) items = Array.from(doc.getElementsByTagName('entry'));
    const out=[];
    for(const it of items){
      const get = tag => { const e=it.getElementsByTagName(tag)[0]; return e? e.textContent.trim() : ''; };
      const title = stripHtml(get('title')); if(!title) continue;
      let link = get('link'); if(!link){ const la=it.getElementsByTagName('link')[0]; if(la) link=la.getAttribute('href')||''; }
      const idm = (link||'').match(/listing\/(\d+)/); if(!idm) continue;
      const descRaw = get('description') || get('summary') || (it.getElementsByTagName('content:encoded')[0]||{}).textContent || '';
      const img = (descRaw.match(/<img[^>]+src=["']([^"']+)["']/i)||[])[1] || imgFrom(it) || null;
      const pm = descRaw.match(/(\d+[.,]\d{2})\s*(€|EUR|USD|\$|£)/) || [];
      out.push({listingId:idm[1], title:{es:title,en:title}, url:{es:link,en:link}, image:img,
        price: pm[1]?parseFloat(pm[1].replace(',','.')):null, currencyRaw: pm[2]||'EUR'});
    }
    return out;
  }
  window.fetchEtsyProducts = async function(lang){
    const shop = (window.ETSY_SHOP && window.ETSY_SHOP.name) || 'EcoInsight';
    // 1) configured JSON feed (serverless connector) — most reliable
    const cfg = window.ETSY_FEED_URL;
    if(cfg){
      try{ const r = await fetch(cfg,{cache:'no-store'}); if(r.ok){ const j=await r.json(); const a=Array.isArray(j)?j:(j.products||j.results||j.items||[]); const n=normalizeJson(a); if(n.length) return n; } }catch(e){}
      const txt = await fetchRaw(cfg);
      if(txt){ try{ const j=JSON.parse(txt); const a=Array.isArray(j)?j:(j.products||j.results||j.items||[]); const n=normalizeJson(a); if(n.length) return n; }catch(e){} }
    }
    // 2) Etsy shop RSS
    const xml = await fetchText(`https://www.etsy.com/shop/${shop}/rss`);
    if(xml){ const items = parseEtsyXml(xml); if(items.length) return items; }
    // 3) shop HTML scrape
    const html = await fetchRaw(`https://www.etsy.com/es/shop/${shop}`);
    if(html){
      const re=/\/listing\/(\d+)\/([a-z0-9-]+)/g; const seen=new Set(); const out=[]; let m;
      while((m=re.exec(html))){ if(seen.has(m[1])) continue; seen.add(m[1]);
        const title=m[2].replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        out.push({listingId:m[1], title:{es:title,en:title}, image:null, price:null, currencyRaw:'EUR',
          url:{es:`https://www.etsy.com/es/listing/${m[1]}/${m[2]}`, en:`https://www.etsy.com/listing/${m[1]}/${m[2]}`}});
      }
      if(out.length) return out;
    }
    return null;
  };
})();


/* ══ intro.jsx ══ */
/* ═══════════════════════════════════════════════════════════
   EcoInsight · OPENING ANIMATION
   "El planeta conectado por datos ambientales"
   sphere of points → lit data nodes → connection lines → logo → slogan
   Plays once per session. Skippable. Lightweight canvas + rAF.
   ═══════════════════════════════════════════════════════════ */
function EcoIntro({lang, onDone}) {
  const L = window.makeL(lang);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(0);
  const [phase, setPhase] = React.useState(0);   // 0 globe, 1 connections, 2 logo, 3 slogan
  const [leaving, setLeaving] = React.useState(false);
  const startRef = React.useRef(performance.now());

  const ACCENT = '#4DB87A', BLUE = '#3B8FDB';

  const finish = React.useCallback(() => {
    setLeaving(true);
    setTimeout(() => { try{ sessionStorage.setItem('ei_intro_seen','1'); }catch(e){} onDone(); }, 620);
  }, [onDone]);

  React.useEffect(() => {
    // phase timeline
    const ts = [
      setTimeout(()=>setPhase(1), 950),
      setTimeout(()=>setPhase(2), 2000),
      setTimeout(()=>setPhase(3), 2650),
      setTimeout(finish, 4200),
    ];
    return () => ts.forEach(clearTimeout);
  }, [finish]);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    let W, H, CX, CY, R;
    const resize = () => {
      W = canvas.clientWidth; H = canvas.clientHeight;
      canvas.width = W*dpr; canvas.height = H*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      CX = W/2; CY = H/2; R = Math.min(W,H)*0.27;
    };
    resize();
    window.addEventListener('resize', resize);

    // fibonacci sphere
    const N = 150;
    const pts = [];
    const gold = Math.PI*(3-Math.sqrt(5));
    for (let i=0;i<N;i++){
      const y = 1 - (i/(N-1))*2;
      const r = Math.sqrt(1-y*y);
      const th = gold*i;
      pts.push({ x:Math.cos(th)*r, y, z:Math.sin(th)*r,
        lit: Math.random()<0.5, delay: Math.random()*900, twk: Math.random()*Math.PI*2 });
    }
    // nearest-neighbour connections (precomputed on unit sphere)
    const links = [];
    for (let i=0;i<N;i++){
      const d = [];
      for (let j=0;j<N;j++){ if(i===j) continue;
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, dz=pts[i].z-pts[j].z;
        d.push([dx*dx+dy*dy+dz*dz, j]);
      }
      d.sort((a,b)=>a[0]-b[0]);
      for (let k=0;k<2;k++){ const j=d[k][1]; if(i<j) links.push([i,j]); }
    }

    const draw = () => {
      const now = performance.now();
      const el = now - startRef.current;
      ctx.clearRect(0,0,W,H);
      const rot = el*0.00035;
      const cos=Math.cos(rot), sin=Math.sin(rot);
      const proj = pts.map(p => {
        const x = p.x*cos - p.z*sin;
        const z = p.x*sin + p.z*cos;
        const sx = CX + x*R, sy = CY + p.y*R;
        const depth = (z+1)/2; // 0 back .. 1 front
        return {sx, sy, depth, lit:p.lit, delay:p.delay, twk:p.twk};
      });

      // connection lines
      const connT = Math.min(1, Math.max(0, (el-700)/1100));
      if (connT>0){
        for (const [i,j] of links){
          const a=proj[i], b=proj[j];
          const dep=(a.depth+b.depth)/2;
          ctx.strokeStyle = `rgba(77,184,122,${0.05+0.16*dep*connT})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
        }
      }
      // points
      for (const p of proj){
        const appear = Math.min(1, Math.max(0,(el-p.delay)/500));
        if (appear<=0) continue;
        const tw = 0.7 + 0.3*Math.sin(now*0.004 + p.twk);
        const baseA = (0.25 + 0.6*p.depth) * appear;
        if (p.lit){
          const r = (1.4 + 1.7*p.depth)*tw;
          const g = ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,r*4);
          g.addColorStop(0, `rgba(77,184,122,${baseA*tw})`);
          g.addColorStop(1, 'rgba(77,184,122,0)');
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(p.sx,p.sy,r*4,0,7); ctx.fill();
          ctx.fillStyle = `rgba(150,235,185,${baseA})`;
          ctx.beginPath(); ctx.arc(p.sx,p.sy,r,0,7); ctx.fill();
        } else {
          ctx.fillStyle = `rgba(140,180,220,${baseA*0.7})`;
          ctx.beginPath(); ctx.arc(p.sx,p.sy,(0.9+1.2*p.depth),0,7); ctx.fill();
        }
      }
      rafRef.current = requestAnimationFrame(draw);
    };
    rafRef.current = requestAnimationFrame(draw);
    return () => { cancelAnimationFrame(rafRef.current); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <div onClick={finish} style={{position:'fixed',inset:0,zIndex:9999,background:'radial-gradient(ellipse 80% 80% at 50% 42%, #11264a 0%, #0D1C32 60%, #081427 100%)',
      display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
      opacity:leaving?0:1,transition:'opacity .6s ease',pointerEvents:leaving?'none':'auto'}}>
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',
        opacity:phase>=2?0.35:1,transform:phase>=2?'scale(1.06)':'scale(1)',transition:'opacity 1s ease, transform 1.4s ease'}}/>
      {/* logo + slogan */}
      <div style={{position:'relative',textAlign:'center',transform:'translateY(-2vh)'}}>
        <div style={{opacity:phase>=2?1:0,transform:phase>=2?'translateY(0) scale(1)':'translateY(14px) scale(.92)',
          transition:'opacity .9s ease, transform 1.1s cubic-bezier(.16,1,.3,1)',display:'flex',alignItems:'center',justifyContent:'center',gap:14,marginBottom:18}}>
          <div style={{display:'flex',filter:'drop-shadow(0 14px 40px rgba(77,184,122,.35))'}}>
            <img src={(window.__resources&&window.__resources.logo)||"uploads/logo-ei.png"} alt="EcoInsight" style={{height:72,width:'auto'}}/>
          </div>
          <span style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:800,fontSize:46,letterSpacing:'-.03em',color:'#E6EDF8'}}>
            <span style={{color:ACCENT}}>Eco</span>Insight
          </span>
        </div>
        <p style={{opacity:phase>=3?1:0,transform:phase>=3?'translateY(0)':'translateY(10px)',transition:'opacity .9s ease, transform 1s ease',
          fontFamily:'DM Sans,sans-serif',fontSize:17,color:'#7A9BBF',letterSpacing:'.01em',maxWidth:440,margin:'0 auto'}}>
          {L('Transformando datos ambientales en decisiones sostenibles.','Turning environmental data into sustainable decisions.')}
        </p>
        <div style={{opacity:phase>=3?1:0,transition:'opacity .8s ease .2s',marginTop:14,display:'flex',gap:6,justifyContent:'center'}}>
          {[0,1,2].map(i=>(<span key={i} style={{width:5,height:5,borderRadius:'50%',background:i===0?ACCENT:i===1?BLUE:'#2C4880'}}/>))}
        </div>
      </div>
      <button onClick={(e)=>{e.stopPropagation();finish();}} style={{position:'absolute',bottom:28,right:30,background:'rgba(255,255,255,.06)',
        border:'1px solid rgba(255,255,255,.14)',color:'#7A9BBF',fontSize:12,fontWeight:600,fontFamily:'Plus Jakarta Sans,sans-serif',
        padding:'7px 16px',borderRadius:20,cursor:'pointer',letterSpacing:'.03em',backdropFilter:'blur(8px)'}}>
        {L('Saltar intro','Skip intro')} →
      </button>
    </div>
  );
}
window.EcoIntro = EcoIntro;


/* ══ chrome.jsx ══ */
/* ═══════════════════════════════════════════════════════════
   EcoInsight · CHROME — Reveal helper, Header, Hero, Footer
   ═══════════════════════════════════════════════════════════ */

/* scroll-reveal wrapper */
function Reveal({children, delay=0, y=22, style}) {
  const ref = React.useRef(null);
  const [seen, setSeen] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current; if(!el) return;
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{ if(e.isIntersecting){ setSeen(true); io.disconnect(); } });
    }, {threshold:0.12, rootMargin:'0px 0px -8% 0px'});
    io.observe(el);
    return ()=>io.disconnect();
  }, []);
  return (
    <div ref={ref} style={{...style, opacity:seen?1:0, transform:seen?'translateY(0)':`translateY(${y}px)`,
      transition:`opacity .7s cubic-bezier(.16,1,.3,1) ${delay}ms, transform .8s cubic-bezier(.16,1,.3,1) ${delay}ms`}}>
      {children}
    </div>
  );
}
window.Reveal = Reveal;

/* keyboard activation helper for clickable non-button elements (Enter / Space) */
window.openKey = (fn) => (e) => { if(e.key==='Enter' || e.key===' '){ e.preventDefault(); fn(); } };

/* reduced-motion guard */
const REDUCED = typeof window!=='undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* responsive breakpoint hook — 'sm' < 640 · 'md' < 1024 · 'lg' ≥ 1024 */
window.useBreakpoint = function() {
  const get = () => window.innerWidth < 640 ? 'sm' : window.innerWidth < 1024 ? 'md' : 'lg';
  const [bp, setBp] = React.useState(get);
  React.useEffect(() => {
    const fn = () => setBp(get());
    window.addEventListener('resize', fn, {passive:true});
    return () => window.removeEventListener('resize', fn);
  }, []);
  return bp;
};

/* animate a number toward a moving target (used by the live calculator) */
window.useTween = function useTween(target, dur=650){
  const [val,setVal] = React.useState(target);
  const cur = React.useRef(target), raf = React.useRef(0), to = React.useRef(0);
  React.useEffect(()=>{
    if(REDUCED){ cur.current=target; setVal(target); return; }
    const from = cur.current, start = performance.now();
    cancelAnimationFrame(raf.current); clearTimeout(to.current);
    const tick = now => {
      const p = Math.min(1,(now-start)/dur), e = 1-Math.pow(1-p,3);
      const nv = from+(target-from)*e; cur.current=nv; setVal(nv);
      if(p<1) raf.current=requestAnimationFrame(tick); else { cur.current=target; setVal(target); }
    };
    raf.current = requestAnimationFrame(tick);
    // safety net: snap to the exact target even if rAF is throttled (e.g. background tab)
    to.current = setTimeout(()=>{ cur.current=target; setVal(target); }, dur+120);
    return ()=>{ cancelAnimationFrame(raf.current); clearTimeout(to.current); };
  },[target,dur]);
  return val;
};

/* count-up number that fires once when scrolled into view */
window.CountUp = function CountUp({value, dur=1500, format, prefix='', suffix=''}){
  const ref = React.useRef(null);
  const [n,setN] = React.useState(REDUCED?value:0);
  const [go,setGo] = React.useState(false);
  React.useEffect(()=>{
    const el = ref.current; if(!el) return;
    const vh = () => window.innerHeight || document.documentElement.clientHeight || 0;
    const fire = () => setGo(true);
    if(el.getBoundingClientRect().top < vh()*0.96) fire();
    let io;
    if(window.IntersectionObserver){ io = new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ fire(); io.disconnect(); } }),{threshold:.4}); io.observe(el); }
    const onScroll = () => { if(el.getBoundingClientRect().top < vh()*0.96) fire(); };
    const targets = [window, document, document.documentElement, document.body];
    targets.forEach(tg=>tg.addEventListener && tg.addEventListener('scroll',onScroll,{passive:true}));
    const t0 = setTimeout(fire, 900);
    return ()=>{ if(io) io.disconnect(); clearTimeout(t0); targets.forEach(tg=>tg.removeEventListener && tg.removeEventListener('scroll',onScroll)); };
  },[]);
  React.useEffect(()=>{
    if(!go) return;
    if(REDUCED){ setN(value); return; }
    const start = performance.now(); let raf;
    const tick = now => { const p=Math.min(1,(now-start)/dur), e=1-Math.pow(1-p,3); setN(value*e); if(p<1) raf=requestAnimationFrame(tick); else setN(value); };
    raf = requestAnimationFrame(tick);
    const settle = setTimeout(()=>setN(value), dur+200); // ensure final value where rAF is throttled
    return ()=>{ cancelAnimationFrame(raf); clearTimeout(settle); };
  },[go,value,dur]);
  const disp = format ? format(n) : Math.round(n).toString();
  return <span ref={ref}>{prefix}{disp}{suffix}</span>;
};

/* ═══ NEWS CENTER ═══ */
function EcoNews({t, lang, go}) {
  const L = window.makeL(lang);
  const bp = window.useBreakpoint();
  const NEWS = window.NEWS, CC = window.CAT_COLORS_NEWS, CEN = window.CAT_EN;
  const [cat, setCat] = React.useState('Todos');
  const [region, setRegion] = React.useState('todas');
  const [q, setQ] = React.useState('');
  const [live, setLive] = React.useState(null);   // null=loading/none, array=live data
  const [feedState, setFeedState] = React.useState('loading'); // loading | live | sample
  const [lastSync, setLastSync] = React.useState(()=>{ const v=parseInt(localStorage.getItem('ei_news_sync')||'0',10); return v||Date.now(); });
  const [, force] = React.useReducer(x=>x+1, 0);

  // fetch the live feed; silent=true keeps current cards on screen during an auto-refresh
  const load = React.useCallback((silent)=>{
    if(!silent) setFeedState('loading');
    if(window.fetchEcoNews){
      const deadline = new Promise(r=>setTimeout(()=>r('__timeout'),11000));
      Promise.race([window.fetchEcoNews(lang), deadline]).then(arr=>{
        if(arr && arr!=='__timeout' && arr.length>=4){
          setLive(arr); setFeedState('live');
          const now=Date.now(); setLastSync(now);
          try{ localStorage.setItem('ei_news_sync', String(now)); }catch(e){}
        } else if(!silent){ setFeedState('sample'); }
      }).catch(()=>{ if(!silent) setFeedState('sample'); });
    } else if(!silent){ setFeedState('sample'); }
  }, [lang]);

  React.useEffect(()=>{ load(false); }, [lang, load]);

  // ── DAILY AUTO-UPDATE ──
  // Re-fetch whenever the calendar day rolls over or 6h elapse, plus on tab refocus,
  // so a page left open always shows fresh daily news without a manual reload.
  React.useEffect(()=>{
    const SIX_H = 6*3600*1000;
    const check = () => {
      const last = parseInt(localStorage.getItem('ei_news_sync')||'0',10)||0;
      const now = Date.now();
      const newDay = new Date(last).toDateString() !== new Date(now).toDateString();
      if(now-last > SIX_H || newDay) load(true);
    };
    const iv = setInterval(check, 60000);
    const onVis = () => { if(document.visibilityState==='visible') check(); };
    document.addEventListener('visibilitychange', onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange', onVis); };
  }, [load]);

  // ticking "updated X ago" indicator
  React.useEffect(()=>{ const i=setInterval(force,1000); return ()=>clearInterval(i); }, []);
  const SRC = live || NEWS;
  React.useEffect(()=>{ window.__feedArticles = SRC; }, [SRC]);
  const cats = ['Todos','ESG','Clima','Energía','Regulación','Minería'];
  const cc = a => CC[a.cat] || t.accent;
  // region classifier: curated items carry impactChile; otherwise infer from text/source/url
  const regionOf = a => {
    if(a.region) return a.region;
    if(a.impactChile) return 'chile';
    const hay = ((a.title&&(a.title.es+' '+a.title.en))+' '+(a.summary?(a.summary.es+' '+a.summary.en):'')+' '+(a.src||'')+' '+(a.url||'')).toLowerCase();
    return /chile|chilen|santiago|cochilco|\.cl\b|sii\b|cmf\b/.test(hay) ? 'chile' : 'internacional';
  };
  const REGIONS = [['todas',L('Todas','All')],['chile','Chile'],['internacional',L('Internacional','International')]];
  const ql = q.trim().toLowerCase();
  const filtered = SRC.filter(a =>
    (cat==='Todos' || a.cat===cat) &&
    (region==='todas' || regionOf(a)===region) &&
    (!ql || a.title[lang].toLowerCase().includes(ql) || a.summary[lang].toLowerCase().includes(ql))
  );
  const featured = filtered[0];
  const sidebar = filtered.slice(1,4);
  const grid = filtered.slice(4,7);
  const mostRead = [...SRC].slice().sort((a,b)=>parseInt(b.read)-parseInt(a.read)).slice(0,4);

  // last-sync display (re-evaluated each tick via `force`)
  const _since = Math.max(0, Math.floor((Date.now()-lastSync)/1000));
  const syncSince = _since<60 ? L('hace','')+(lang==='en'?'':' ')+_since+'s'+(lang==='en'?' ago':'')
    : _since<3600 ? L('hace','')+(lang==='en'?'':' ')+Math.floor(_since/60)+' min'+(lang==='en'?' ago':'')
    : L('hace','')+(lang==='en'?'':' ')+Math.floor(_since/3600)+' h'+(lang==='en'?' ago':'');
  const syncAt = new Date(lastSync).toLocaleString(lang==='en'?'en-US':'es-CL',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  );
  const AiTag = () => (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,background:t.accent2Dim,color:t.accent2,fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:5,fontFamily:'Plus Jakarta Sans',letterSpacing:'.04em'}}>
      <span style={{width:4,height:4,borderRadius:'50%',background:t.accent2}}/>{L('Resumen IA','AI summary')}
    </span>
  );

  return (
    <section id="noticias" style={{background:t.bg,padding:'96px 0',borderTop:`1px solid ${t.border}`,scrollMarginTop:84}}>
      <div style={{maxWidth:1180,margin:'0 auto',padding:bp==='sm'?'0 18px':'0 32px'}}>
        <Reveal>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:30,flexWrap:'wrap',gap:20}}>
          <div>
            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:t.critical+'15',border:`1px solid ${t.critical}35`,borderRadius:20,padding:'5px 14px',marginBottom:18}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:t.critical,display:'inline-block',animation:'pulse 1.8s infinite'}}/>
              <span style={{color:t.critical,fontSize:11,fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',fontFamily:'Plus Jakarta Sans',whiteSpace:'nowrap'}}>{L('Paso 01 · Infórmate','Step 01 · Get informed')}</span>
            </div>
            <h2 style={{fontSize:44,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.1,letterSpacing:'-.022em',marginBottom:10}}>{L('Centro de','News')}<br/>{L('Noticias Ambientales','& Environmental Hub')}</h2>
            <p style={{fontSize:16,color:t.textMuted,fontFamily:'DM Sans',lineHeight:1.6,maxWidth:480}}>{L('Noticias ESG, clima y regulación para LATAM — con resumen IA e impacto para Chile y empresas.','ESG, climate and regulation news for LATAM — with AI summary and impact for Chile and companies.')}</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
            <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12,color:t.textMuted,fontFamily:'DM Mono'}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:feedState==='live'?t.positive:feedState==='loading'?t.warning:t.textFaint,display:'inline-block',animation:feedState==='loading'?'pulse 1s infinite':'pulse 2.4s infinite'}}/>
              {feedState==='live'? L('Feed en vivo · RSS','Live feed · RSS') : feedState==='loading'? L('Cargando feed…','Loading feed…') : L('Contenido curado','Curated content')}
            </div>
            <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:10.5,color:t.accent,fontFamily:'Plus Jakarta Sans',fontWeight:700}}>
              <span style={{display:'inline-block'}}>↻</span>{L('Actualización automática diaria','Auto-updates daily')}
            </span>
            <span style={{fontSize:10.5,color:t.textFaint,fontFamily:'DM Sans'}}>
              {L('Última','Updated')}: {syncSince} · {syncAt}
            </span>
          </div>
        </div>
        {/* region filter (Chile / Internacional) */}
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14}}>
          {REGIONS.map(([id,lbl])=>(
            <button key={id} onClick={()=>setRegion(id)} aria-pressed={region===id} style={{padding:'8px 17px',borderRadius:20,border:`1px solid ${region===id?t.accent:t.border}`,background:region===id?t.accentDim:'transparent',color:region===id?t.accent:t.textMuted,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .18s',fontFamily:'Plus Jakarta Sans'}}>{lbl}</button>

        </div>
        {/* search + filters */}
        <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:28,flexWrap:'wrap'}}>

window.calcEquiv = (totT) => {
  const kg = totT*1000, f = window.EQUIV_FACTORS;
  return {
    trees: Math.round(kg/f.trees),
    fuel: Math.round(kg/f.fuel),
    km: Math.round(kg/f.km),
    phone: Math.round(kg/f.phone),
    kwh: Math.round(kg/f.kwh),

};

/* stable, module-level input + scope (never remount → no focus loss) */
function CalcField({t, label, value, onChange, unit}){

          onFocus={e=>e.target.style.borderColor=t.accent} onBlur={e=>e.target.style.borderColor=t.border}/>
        <span style={{padding:'10px',background:t.card,border:`1px solid ${t.border}`,borderRadius:8,color:t.textMuted,fontSize:11,fontFamily:'DM Mono',display:'flex',alignItems:'center',whiteSpace:'nowrap'}}>{unit}</span>
      </div>

}
function CalcSelect({t, label, value, onChange, options}){
  const iSel={width:'100%',background:t.surface,border:`1px solid ${t.border}`,color:t.text,borderRadius:8,padding:'10px 12px',fontSize:13,fontFamily:'DM Sans',cursor:'pointer'};

}
function CalcScope({t, id, title, sub, color, val, open, setOpen, children}){
  const bp = window.useBreakpoint();

}

function EcoCalculator({t, lang, go}) {

  const SAVE_KEY='ei_calc_v1', HSAVE_KEY='ei_calc_home_v1', MODE_KEY='ei_calc_mode';
  const saved  = (()=>{ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}'); }catch(e){ return {}; } })();
  const hsaved = (()=>{ try{ return JSON.parse(localStorage.getItem(HSAVE_KEY)||'{}'); }catch(e){ return {}; } })();

  const [mode, setMode] = React.useState(()=>localStorage.getItem(MODE_KEY)||'empresa');
  React.useEffect(()=>{ try{ localStorage.setItem(MODE_KEY,mode); }catch(e){} }, [mode]);

  /* ── EMPRESA state ── */
  const [country, setCountry]   = React.useState(saved.country || 'chile');
  const [industry, setIndustry] = React.useState(saved.industry || 'mineria');
  const [v, setV]               = React.useState(saved.v || {diesel:'',gasolina:'',gnl:'',elec:'',vuelos:'',flete:''});
  const [open, setOpen]         = React.useState(saved.open || 's1');
  React.useEffect(()=>{ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({country,industry,v,open})); }catch(e){} }, [country,industry,v,open]);
  const upd = k => e => { const val = e.target.value; setV(p=>({...p,[k]:val})); };
  const n = k => parseFloat(v[k])||0;
  const c_s1=(n('diesel')*2.68+n('gasolina')*2.31+n('gnl')*1.89)/1000;
  const c_s2=(n('elec')*(GRIDS[country]||.319))/1000;
  const c_s3=(n('vuelos')*.255+n('flete')*.168)/1000;
  const c_tot=c_s1+c_s2+c_s3;
  const industries=[['mineria',L('Minería','Mining')],['construccion',L('Construcción','Construction')],['agro',L('Agroindustria','Agribusiness')],['manufactura',L('Manufactura','Manufacturing')],['transporte',L('Transporte & Logística','Transport & Logistics')],['servicios',L('Servicios','Services')]];

  /* ── HOGAR state ── */

  React.useEffect(()=>{ try{ localStorage.setItem(HSAVE_KEY, JSON.stringify({country:hcountry,people,diet,hv,open:hopen})); }catch(e){} }, [hcountry,people,diet,hv,hopen]);
  const hupd = k => e => { const val = e.target.value; setHv(p=>({...p,[k]:val})); };
  const hn = k => parseFloat(hv[k])||0;
  const persons = Math.max(1, Math.round(parseFloat(people)||1));
  const h_energy = (hn('elec')*12*(GRIDS[hcountry]||.319) + hn('gnat')*12*HF.gnl + hn('glp')*12*HF.glp)/1000;
  const h_trans  = (hn('gasolina')*12*HF.gasolina + hn('diesel')*12*HF.diesel + hn('bus')*52*HF.bus + hn('vuelos')*HF.flight)/1000;
  const dietKg   = (window.DIETS.find(d=>d[0]===diet)||['',{},1800])[2];
  const h_cons   = (dietKg*persons + hn('residuos')*52*HF.waste)/1000;
  const h_tot    = h_energy+h_trans+h_cons;
  const perCap   = h_tot/persons;

  /* ── active model ── */
  const gradeOf = (g)=>({g, c:GC[g]});
  const corpGrade = c_tot<10?'A':c_tot<50?'B':c_tot<200?'C':c_tot<500?'D':c_tot<1000?'E':'F';

  ];

  const snapshot = ()=>({
    mode,

                <CalcField t={t} label={L('Flete de carga','Freight')} value={v.flete} onChange={upd('flete')} unit="ton-km/año"/>

              <CalcScope t={t} id="h1" open={hopen} setOpen={setHopen} title={L('Energía del hogar','Home energy')} sub={L('Electricidad, gas natural y gas licuado','Electricity, natural gas and LPG')} color={t.accent} val={h_energy}>

              </CalcScope>
              <CalcScope t={t} id="h2" open={hopen} setOpen={setHopen} title={L('Transporte','Transport')} sub={L('Vehículo propio, transporte público y vuelos','Own vehicle, public transport and flights')} color={t.accent2} val={h_trans}>

                <CalcField t={t} label={L('Diésel vehículo','Vehicle diesel')} value={hv.diesel} onChange={hupd('diesel')} unit="L/mes"/>
                <CalcField t={t} label={L('Transporte público','Public transport')} value={hv.bus} onChange={hupd('bus')} unit="km/sem"/>
                <CalcField t={t} label={L('Vuelos','Flights')} value={hv.vuelos} onChange={hupd('vuelos')} unit="km/año"/>
              </CalcScope>
              <CalcScope t={t} id="h3" open={hopen} setOpen={setHopen} title={L('Consumo y residuos','Goods & waste')} sub={L('Alimentación y residuos a relleno sanitario','Diet and landfilled waste')} color={t.warning} val={h_cons}>
                <div style={{gridColumn:'span 2'}}>
                  <CalcSelect t={t} label={L('Dieta (por persona)','Diet (per person)')} value={diet} onChange={e=>setDiet(e.target.value)} options={window.DIETS.map(d=>[d[0], d[1][lang]])}/>
                </div>
                <CalcField t={t} label={L('Residuos a relleno','Landfilled waste')} value={hv.residuos} onChange={hupd('residuos')} unit="kg/sem"/>
                <div style={{padding:'10px 14px',background:t.warning+'12',borderRadius:8,fontSize:11.5,color:t.textMuted,fontFamily:'DM Sans',display:'flex',alignItems:'center'}}>
                  {L('Dieta','Diet')}: <strong style={{color:t.warning,fontFamily:'DM Mono',margin:'0 4px'}}>{fmt(dietKg)}</strong> kgCO₂e/{L('pers·año','ppl·yr')}
                </div>
              </CalcScope>
            </React.Fragment>
            )}

            {/* EQUIVALENCES (shared) */}
            <div style={{marginTop:26}}>
              <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:t.textMuted,marginBottom:14,fontFamily:'Plus Jakarta Sans'}}>{L('Equivalencias del mundo real','Real-world equivalences')}</div>
              <div style={{display:'grid',gridTemplateColumns:bp==='sm'?'repeat(3,1fr)':'repeat(5,1fr)',gap:10}}>
                {EQ.map(e=>(
                  <div key={e.k} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,padding:'14px 12px',textAlign:'center'}}>
                    <div style={{fontSize:20,marginBottom:7}}>{e.ic}</div>
                    <div style={{fontSize:tot>0?(e.v>99999?16:19):19,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:tot>0?e.col:t.textFaint,lineHeight:1,marginBottom:5,letterSpacing:'-.02em'}}>{tot>0?fmt(e.v):'—'}</div>
                    <div style={{fontSize:10.5,color:t.text,fontWeight:600,fontFamily:'Plus Jakarta Sans',lineHeight:1.25}}>{e.label}</div>
                    <div style={{fontSize:9.5,color:t.textMuted,fontFamily:'DM Sans',marginTop:2}}>{e.sub}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          </Reveal>

          {/* Results Panel */}
          <div style={{position:bp!=='sm'?'sticky':'static',top:100,background:t.card,border:`1px solid ${t.border}`,borderRadius:20,padding:26}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
              <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:t.textMuted,fontFamily:'Plus Jakarta Sans'}}>{L('Resultado estimado','Estimated result')}</span>
              <span style={{fontSize:10,fontWeight:700,color:t.accent,fontFamily:'Plus Jakarta Sans',background:t.accentDim,border:`1px solid ${t.accent}33`,borderRadius:20,padding:'3px 10px'}}>{mode==='empresa'?L('Empresa','Company'):L('Hogar','Household')}</span>
            </div>
            <div style={{display:'flex',justifyContent:'center',marginBottom:18}}>
              <div style={{position:'relative',width:150,height:150}}>
                <div style={{width:150,height:150,borderRadius:'50%',background:donut,
                  WebkitMaskImage:'radial-gradient(transparent 49px, black 50px)',maskImage:'radial-gradient(transparent 49px, black 50px)',transition:'background .55s'}}/>
                <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
                  <div style={{fontSize:tot>999?18:24,fontWeight:800,color:t.text,fontFamily:'Plus Jakarta Sans',lineHeight:1}}>{tot>0?totTween.toFixed(1):'—'}</div>
                  <div style={{fontSize:9,color:t.textMuted,fontFamily:'DM Mono',marginTop:2}}>tCO₂e/{L('año','yr')}</div>
                </div>
              </div>
            </div>
            {tot>0&&(
              <div style={{textAlign:'center',marginBottom:14,padding:'10px 0',borderTop:`1px solid ${t.border}`,borderBottom:`1px solid ${t.border}`}}>
                <span style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:13,color:t.textMuted,fontFamily:'DM Sans'}}>
                  {L('Clasificación ESG','ESG rating')}:
                  <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:30,height:30,borderRadius:7,background:gr.c+'22',border:`1px solid ${gr.c}44`,color:gr.c,fontWeight:800,fontSize:15,fontFamily:'Plus Jakarta Sans'}}>{gr.g}</span>
                </span>
                {mode==='hogar' && <div style={{fontSize:11,color:t.textMuted,fontFamily:'DM Sans',marginTop:7}}>{perCap.toFixed(2)} tCO₂e {L('por persona/año','per person/yr')} · {persons} {persons>1?L('personas','people'):L('persona','person')}</div>}
              </div>
            )}
            {segs.map(s=>(
              <div key={s.key} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <span style={{fontSize:11,color:t.textMuted,display:'flex',alignItems:'center',gap:5}}>
                    <span style={{width:7,height:7,borderRadius:'50%',background:s.color,display:'inline-block'}}/>{s.label}
                  </span>
                  <span style={{fontSize:11,fontFamily:'DM Mono',color:t.text}}>{s.val.toFixed(2)} t</span>
                </div>
                <div style={{height:5,borderRadius:3,background:t.border,overflow:'hidden'}}>
                  <div style={{height:'100%',width:tot>0?`${p(s.val)}%`:'0%',background:s.color,borderRadius:3,transition:'width .55s'}}/>
                </div>
              </div>
            ))}

            {/* ESG legend */}
            <EsgLegend t={t} lang={lang} mode={mode} current={tot>0?gr.g:null}/>

            <button disabled={tot<=0} onClick={()=>go('report',snapshot())} style={{marginTop:16,width:'100%',padding:14,background:tot>0?t.cta:t.border,color:tot>0?t.ctaText:t.textFaint,border:'none',borderRadius:10,fontSize:14,fontWeight:700,cursor:tot>0?'pointer':'not-allowed',fontFamily:'Plus Jakarta Sans',transition:'opacity .2s'}}
              onMouseEnter={e=>{if(tot>0)e.currentTarget.style.opacity='.82'}} onMouseLeave={e=>e.currentTarget.style.opacity='1'}>
              {L('Ver reporte PDF','View PDF report')} →
            </button>
            <p style={{textAlign:'center',fontSize:10,color:t.textFaint,marginTop:8,lineHeight:1.5,fontFamily:'DM Sans'}}>{tot>0?L('Reporte profesional listo para descargar','Professional report ready to download'):L('Ingresa datos para generar el reporte','Enter data to generate the report')}</p>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ═══ PDF REPORT PREVIEW ═══ */
function EcoReport({t, lang, data, go}) {
  const L = window.makeL(lang);
  const bp = window.useBreakpoint();
  React.useEffect(()=>{ window.scrollTo(0,0); },[]);
  if(!data){ go('calculator'); return null; }
  const {tot,gr,eq,sector,date} = data;
  const mode = data.mode || 'empresa';
  const segments = data.segments || [];
  const fmt = x => x.toLocaleString(lang==='en'?'en-US':'es-CL');
  const p = w => tot>0?Math.round(w/tot*100):0;
  // document palette (always light "paper")
  const INK='#0D1C32', SUB='#5A6B82', LINE='#E2E7EE', GREEN='#2E9E63', BLUE='#3B8FDB', AMBER='#D4973A';

    L('Prefiere transporte público, bicicleta o un vehículo eléctrico en los trayectos frecuentes.','Favour public transport, cycling or an electric vehicle for frequent trips.'),
    L('Reduce el consumo de carne roja y prioriza alimentos locales y de temporada.','Cut red-meat consumption and prioritise local, seasonal food.'),
    L('Mejora el aislamiento del hogar y cambia a iluminación y electrodomésticos eficientes.','Improve home insulation and switch to efficient lighting and appliances.'),
  ] : [
    L('Migrar a contratos de electricidad 100% renovable (PPA) para reducir Alcance 2.','Move to 100% renewable electricity contracts (PPA) to cut Scope 2.'),
    L('Electrificar la flota y optimizar rutas para abatir el Alcance 1.','Electrify the fleet and optimize routes to abate Scope 1.'),
    L('Medir y exigir reportes a proveedores clave para gestionar el Alcance 3.','Measure and require reporting from key suppliers to manage Scope 3.'),
    L('Fijar una meta de reducción validada por SBTi alineada a 1,5 °C.','Set an SBTi-validated reduction target aligned to 1.5 °C.'),
  ];
  const methodology = mode==='hogar' ? L('Cálculo personal · Factores LATAM','Personal estimate · LATAM factors') : 'GHG Protocol · '+L('Alcances','Scopes')+' 1-2-3';
  const reportKind = mode==='hogar' ? L('Reporte de Huella Personal','Personal Footprint Report') : L('Reporte de Huella de Carbono','Carbon Footprint Report');
  const subStandard = mode==='hogar' ? L('Huella personal','Personal footprint') : 'GHG Protocol';
  const bar = (label,val,col)=>(
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:5,fontFamily:'DM Sans'}}>
        <span style={{color:INK,fontWeight:600}}>{label}</span><span style={{color:SUB,fontFamily:'DM Mono'}}>{val.toFixed(2)} t · {p(val)}%</span>
      </div>
      <div style={{height:8,background:'#EEF1F5',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:`${p(val)}%`,background:col,borderRadius:4}}/></div>
    </div>
  );
  return (
    <div style={{background:t.bg,minHeight:'100vh',paddingTop:84,paddingBottom:70}}>
      {/* toolbar */}
      <div style={{maxWidth:820,margin:'0 auto 18px',padding:bp==='sm'?'0 16px':'0 24px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <button onClick={()=>go('calculator')} style={{display:'inline-flex',alignItems:'center',gap:8,background:'transparent',border:`1px solid ${t.border}`,color:t.textMuted,fontSize:13,fontWeight:600,fontFamily:'Plus Jakarta Sans',padding:'8px 16px',borderRadius:20,cursor:'pointer'}}>← {L('Volver a la calculadora','Back to calculator')}</button>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>window.print()} style={{background:'transparent',border:`1px solid ${t.borderStrong}`,color:t.text,fontSize:13,fontWeight:700,fontFamily:'Plus Jakarta Sans',padding:'9px 18px',borderRadius:9,cursor:'pointer'}}>{L('Imprimir','Print')}</button>
          <button onClick={()=>alert(L('La descarga del PDF se habilita en producción. Esta es una vista previa del diseño del reporte.','PDF download is enabled in production. This is a design preview of the report.'))}
            style={{background:t.cta,color:t.ctaText,border:'none',fontSize:13,fontWeight:700,fontFamily:'Plus Jakarta Sans',padding:'9px 18px',borderRadius:9,cursor:'pointer'}}>↓ {L('Descargar Reporte','Download Report')}</button>
        </div>
      </div>

      {/* PAPER */}
      <div style={{maxWidth:820,margin:'0 auto',padding:bp==='sm'?'0 16px':'0 24px'}}>
        <div className="paper-print" style={{background:'#FFFFFF',borderRadius:6,overflow:'hidden',boxShadow:'0 30px 80px rgba(0,0,0,.4)',fontFamily:'DM Sans,sans-serif'}}>
          {/* header band */}
          <div style={{background:'#0D1C32',padding:'26px 40px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:11}}>
              <div style={{display:'flex'}}><img src={(window.__resources&&window.__resources.logo)||"uploads/logo-ei.png"} alt="EcoInsight" style={{height:34}}/></div>
              <span style={{fontFamily:'Plus Jakarta Sans',fontWeight:800,fontSize:21,color:'#E6EDF8',letterSpacing:'-.02em'}}><span style={{color:'#4DB87A'}}>Eco</span>Insight</span>
            </div>
            <div style={{textAlign:'right',maxWidth:240}}>
              <div style={{fontSize:11,color:'#7A9BBF',fontFamily:'Plus Jakarta Sans',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',lineHeight:1.45}}>{reportKind}</div>
              <div style={{fontSize:11,color:'#52688A',fontFamily:'DM Mono',marginTop:7}}>{subStandard} · {date}</div>
            </div>
          </div>

          <div style={{padding:'34px 40px 40px'}}>
            {/* meta row */}
            <div style={{display:'flex',justifyContent:'space-between',gap:20,marginBottom:28,flexWrap:'wrap'}}>

                <div style={{fontSize:10,color:SUB,textTransform:'uppercase',letterSpacing:'.09em',fontWeight:700,fontFamily:'Plus Jakarta Sans',marginBottom:4}}>{mode==='hogar'?L('Perfil','Profile'):L('Sector','Sector')}</div>
                <div style={{fontSize:15,color:INK,fontWeight:700,fontFamily:'Plus Jakarta Sans'}}>{sector}</div>

                <div style={{fontSize:10,color:SUB,textTransform:'uppercase',letterSpacing:'.09em',fontWeight:700,fontFamily:'Plus Jakarta Sans',marginBottom:4}}>{L('Metodología','Methodology')}</div>

              </div>
              <div>
                <div style={{fontSize:10,color:SUB,textTransform:'uppercase',letterSpacing:'.09em',fontWeight:700,fontFamily:'Plus Jakarta Sans',marginBottom:4}}>{L('Clasificación','Rating')}</div>
                <div style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:30,height:30,borderRadius:7,background:gr.c+'22',border:`1px solid ${gr.c}55`,color:gr.c,fontWeight:800,fontSize:16,fontFamily:'Plus Jakarta Sans'}}>{gr.g}</div>
              </div>
            </div>

            {/* big total */}
            <div style={{display:'flex',gap:26,alignItems:'center',background:'#F6F8FA',border:`1px solid ${LINE}`,borderRadius:12,padding:'24px 28px',marginBottom:28}}>

                </div>
                <div style={{fontSize:12.5,color:SUB,fontFamily:'DM Mono',marginTop:6}}>= {fmt(Math.round(tot*1000))} kg CO₂e{mode==='hogar'&&data.perCap?` · ${data.perCap.toFixed(2)} t/${L('persona','person')}`:''}</div>
              </div>
              <div style={{flex:1,borderLeft:`1px solid ${LINE}`,paddingLeft:26}}>

            {/* equivalences */}
            <div style={{fontSize:11,color:INK,textTransform:'uppercase',letterSpacing:'.1em',fontWeight:700,fontFamily:'Plus Jakarta Sans',marginBottom:14}}>{L('Equivalencias','Equivalences')}</div>
            <div style={{display:'grid',gridTemplateColumns:bp==='sm'?'repeat(3,1fr)':'repeat(5,1fr)',gap:10,marginBottom:30}}>
              {[['🌳',eq.trees,L('árboles/año','trees/yr')],['⛽',eq.fuel,L('litros','litres')],['🚗',eq.km,L('km auto','car km')],['🔋',eq.phone,L('cargas móvil','phone chg')],['⚡',eq.kwh,L('kWh','kWh')]].map(([ic,val,lb],i)=>(
                <div key={i} style={{border:`1px solid ${LINE}`,borderRadius:10,padding:'14px 8px',textAlign:'center'}}>
                  <div style={{fontSize:18,marginBottom:6}}>{ic}</div>
                  <div style={{fontSize:val>99999?14:16,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:INK,lineHeight:1}}>{fmt(val)}</div>

                </div>
              ))}

            {/* recommendations */}
            <div style={{fontSize:11,color:INK,textTransform:'uppercase',letterSpacing:'.1em',fontWeight:700,fontFamily:'Plus Jakarta Sans',marginBottom:14}}>{L('Recomendaciones','Recommendations')}</div>

                  <span style={{fontSize:13,color:'#33414F',lineHeight:1.5,fontFamily:'DM Sans'}}>{r}</span>

              <div style={{display:'flex',gap:6}}>

            </div>
          </div>
        </div>
        <p style={{textAlign:'center',fontSize:12,color:t.textFaint,marginTop:18,fontFamily:'DM Sans'}}>{L('Vista previa del reporte · la descarga del PDF se habilita en producción','Report preview · PDF download is enabled in production')}</p>

        {/* funnel bridge → products */}

            <div style={{fontSize:13.5,color:t.textMuted,lineHeight:1.55,fontFamily:'DM Sans'}}>{mode==='hogar'?L('Explora guías y plantillas prácticas para bajar tus emisiones en casa, paso a paso.','Explore practical guides and templates to lower your emissions at home, step by step.'):L('Convierte esta estimación en un inventario GEI completo con nuestras plantillas profesionales alineadas a GHG Protocol e ISO 14064.','Turn this estimate into a full GHG inventory with our professional templates aligned to GHG Protocol and ISO 14064.')}</div>
          </div>
          <button onClick={()=>go('home','#marketplace')} style={{flexShrink:0,background:t.cta,color:t.ctaText,border:'none',borderRadius:10,padding:'13px 24px',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Plus Jakarta Sans'}}>{L('Ver plantillas','Browse templates')} →</button>
        </div>
      </div>
    </div>
  );
}

function EcoSolutions({t, lang, go}) {
  const L = window.makeL(lang);

function EcoMarketplace({t, lang}) {
  const L = window.makeL(lang);

  const [cat, setCat] = React.useState('todos');
  const [hov, setHov] = React.useState(null);
  const [live, setLive] = React.useState(null);
  const [sync, setSync] = React.useState('loading'); // loading | live | catalog
  const [lastSync, setLastSync] = React.useState(()=>parseInt(localStorage.getItem('ei_etsy_sync')||'0',10)||0);
  const [, force] = React.useReducer(x=>x+1, 0);
  const CATALOG = window.ETSY_PRODUCTS || [];
  const SHOP = window.ETSY_SHOP || {name:'EcoInsight', url:'https://www.etsy.com/es/shop/EcoInsight?ref=profile_header'};

  // Pull the catalog from Etsy (configured feed → shop RSS → HTML); falls back to the bundled verified catalog.
  const load = React.useCallback((silent)=>{
    if(!silent) setSync('loading');
    if(window.fetchEtsyProducts){
      const dl = new Promise(r=>setTimeout(()=>r('__t'),11000));
      Promise.race([window.fetchEtsyProducts(lang), dl]).then(arr=>{
        if(arr && arr!=='__t' && arr.length){ setLive(arr); setSync('live'); const now=Date.now(); setLastSync(now); try{localStorage.setItem('ei_etsy_sync',String(now));}catch(e){} }
        else setSync('catalog');
      }).catch(()=>setSync('catalog'));
    } else setSync('catalog');
  }, [lang]);
  React.useEffect(()=>{ load(false); }, [lang, load]);
  // AUTO-UPDATE: re-sync when the day rolls over or every 6h, plus on tab refocus
  React.useEffect(()=>{
    const SIX=6*3600*1000;
    const chk=()=>{ const last=parseInt(localStorage.getItem('ei_etsy_sync')||'0',10)||0, now=Date.now(); const nd=new Date(last).toDateString()!==new Date(now).toDateString(); if(now-last>SIX||nd) load(true); };
    const iv=setInterval(chk,60000); const ov=()=>{ if(document.visibilityState==='visible') chk(); };
    document.addEventListener('visibilitychange',ov);
    return ()=>{ clearInterval(iv); document.removeEventListener('visibilitychange',ov); };
  }, [load]);
  React.useEffect(()=>{ const i=setInterval(force,1000); return ()=>clearInterval(i); }, []);

  // merge any live data over the bundled catalog (live store order wins)
  const products = React.useMemo(()=>{
    const byId={}; CATALOG.forEach(p=>{ byId[p.listingId]={...p}; });
    if(live && live.length){
      return live.map(lp=>{
        const b=byId[lp.listingId]||{};
        const cr=lp.currencyRaw; const cur=(cr==='USD'||cr==='$')?'USD':cr==='£'?'GBP':'EUR';
        return {
          listingId:lp.listingId,
          name: b.name||lp.title,
          desc: b.desc||lp.desc||null,
          url: (b.url&&b.url.es)?b.url:lp.url,
          price: b.price!=null?b.price:lp.price,
          oldPrice: b.oldPrice,
          currency: b.currency||cur,
          fmt: b.fmt||lp.fmt||'',
          cat: b.cat||lp.cat||'',
          th: b.th||'report', bc: b.bc||'accent',
          badge: b.badge||null,
          image: lp.image||b.image||null,
        };
      });
    }
    return CATALOG.map(p=>({...p}));
  }, [live]);

  const bcOf = p => t[p.bc] || t.accent;
  const money = (x,c)=> x.toLocaleString(lang==='en'?(c==='USD'?'en-US':'en-IE'):(c==='USD'?'en-US':'es-ES'),{style:'currency',currency:c||'EUR'});
  const CATS=[['todos',L('Todos','All')],['ofertas',L('Ofertas','Deals')],['excel','Excel'],['powerbi','Power BI']];
  const shown = cat==='todos'?products : cat==='ofertas'?products.filter(p=>p.oldPrice) : products.filter(p=>p.cat===cat);
  const sinceTxt = (()=>{ if(!lastSync) return ''; const s=Math.max(0,Math.floor((Date.now()-lastSync)/1000)); return s<60?(L('hace ','')+s+'s'+(lang==='en'?' ago':'')):s<3600?(L('hace ','')+Math.floor(s/60)+' min'+(lang==='en'?' ago':'')):(L('hace ','')+Math.floor(s/3600)+' h'+(lang==='en'?' ago':'')); })();
  return (
    <section id="marketplace" style={{background:t.surface,padding:'96px 0',borderTop:`1px solid ${t.border}`,scrollMarginTop:84}}>
      <div style={{maxWidth:1180,margin:'0 auto',padding:bp==='sm'?'0 18px':'0 32px'}}>
        <Reveal>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:44,flexWrap:'wrap',gap:22}}>
          <div>
            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:t.accent2Dim,border:`1px solid ${t.accent2}35`,borderRadius:20,padding:'5px 14px',marginBottom:18}}>
              <span style={{color:t.accent2,fontSize:11,fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',fontFamily:'Plus Jakarta Sans',whiteSpace:'nowrap'}}>{L('Paso 04 · Actúa','Step 04 · Take action')}</span>
            </div>
            <h2 style={{fontSize:44,fontWeight:800,fontFamily:'Plus Jakarta Sans',color:t.text,lineHeight:1.1,marginBottom:12,letterSpacing:'-.022em'}}>{L('Plantillas ESG','ESG Templates')}<br/>{L('Listas para Implementar','Ready to Implement')}</h2>
            <p style={{fontSize:17,color:t.textMuted,lineHeight:1.6,fontFamily:'DM Sans'}}>{L('Descarga, personaliza y reporta. Formatos Power BI, Excel y PDF — directo desde nuestra tienda Etsy.','Download, customise and report. Power BI, Excel & PDF formats — straight from our Etsy store.')}</p>
            <div style={{display:'inline-flex',alignItems:'center',gap:10,marginTop:14,fontSize:12.5,color:t.textMuted,fontFamily:'DM Sans',flexWrap:'wrap'}}>
              <span style={{color:t.warning,fontWeight:700,fontFamily:'Plus Jakarta Sans'}}>{L('★ 4,0','★ 4.0')}</span>
              <span style={{width:3,height:3,borderRadius:'50%',background:t.textFaint}}/>
              <span>{L('12 ventas en Etsy','12 sales on Etsy')}</span>
              <span style={{width:3,height:3,borderRadius:'50%',background:t.textFaint}}/>
              <span>{L('Descarga instantánea','Instant download')}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginTop:13,flexWrap:'wrap'}}>
              <span style={{display:'inline-flex',alignItems:'center',gap:7,fontSize:11.5,fontFamily:'DM Mono',color:t.textMuted,background:t.card,border:`1px solid ${t.border}`,borderRadius:20,padding:'4px 11px'}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:sync==='live'?t.positive:sync==='loading'?t.warning:t.textFaint,display:'inline-block',animation:sync==='loading'?'pulse 1s infinite':'pulse 2.4s infinite'}}/>
                {sync==='live'?L('Sincronizado con Etsy','Synced with Etsy'):sync==='loading'?L('Sincronizando…','Syncing…'):L('Catálogo verificado','Verified catalog')}
              </span>
              {lastSync>0 && <span style={{fontSize:10.5,color:t.textFaint,fontFamily:'DM Sans'}}>{L('Actualizado ','Updated ')}{sinceTxt}</span>}
              <button onClick={()=>load(false)} title={L('Actualizar desde Etsy','Refresh from Etsy')}
                style={{display:'inline-flex',alignItems:'center',gap:5,background:'transparent',border:`1px solid ${t.border}`,color:t.textMuted,fontSize:11,fontWeight:700,fontFamily:'Plus Jakarta Sans',borderRadius:20,padding:'4px 12px',cursor:'pointer',transition:'all .18s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=t.accent;e.currentTarget.style.color=t.accent;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=t.border;e.currentTarget.style.color=t.textMuted;}}>↻ {L('Actualizar','Refresh')}</button>
            </div>
          </div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {CATS.map(([id,lbl])=>(
              <button key={id} onClick={()=>setCat(id)} style={{padding:'8px 17px',borderRadius:20,border:`1px solid ${cat===id?t.accent:t.border}`,background:cat===id?t.accentDim:'transparent',color:cat===id?t.accent:t.textMuted,fontSize:13,fontWeight:600,cursor:'pointer',transition:'all .18s',fontFamily:'Plus Jakarta Sans'}}>{lbl}</button>
            ))}
          </div>
        </div>
        </Reveal>
        <div style={{display:'grid',gridTemplateColumns:bp==='lg'?'repeat(3,1fr)':bp==='md'?'repeat(2,1fr)':'1fr',gap:22}}>
          {shown.map((tp,i)=>(
            <Reveal key={tp.listingId} delay={(i%3)*70}>
            <div onMouseEnter={()=>setHov(tp.listingId)} onMouseLeave={()=>setHov(null)}

/* ═══ LEAD CAPTURE FORM (no native <form>; controlled + client validation) ═══ */
function EcoLeadForm({t, lang}){
  const L = window.makeL(lang);
  const bp = window.useBreakpoint();
  const [f, setF] = React.useState({name:'',email:'',company:'',interest:''});
  const [err, setErr] = React.useState({});
  const [sent, setSent] = React.useState(false);
  const interests = [['huella',L('Huella de carbono','Carbon footprint')],['esg',L('Reporte ESG','ESG report')],['plantillas',L('Plantillas','Templates')]];
  const set = k => e => { const v=e.target.value; setF(p=>({...p,[k]:v})); setErr(p=>({...p,[k]:null})); };
  const emailOk = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const submit = () => {
    const e={};
    if(!f.name.trim()) e.name=L('Ingresa tu nombre.','Enter your name.');
    if(!f.email.trim()) e.email=L('Ingresa tu email.','Enter your email.');
    else if(!emailOk(f.email)) e.email=L('Email no válido.','Invalid email.');
    if(!f.company.trim()) e.company=L('Ingresa tu empresa.','Enter your company.');
    if(!f.interest) e.interest=L('Selecciona un interés.','Select an interest.');
    setErr(e);
    if(Object.keys(e).length){ const fk=Object.keys(e)[0]; const el=document.getElementById('lead-'+fk); el&&el.focus(); return; }
    // TODO conectar a endpoint/Formspree (p.ej. fetch('https://formspree.io/f/XXXX',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(f)}))
    setSent(true);
  };
  const lab={display:'block',fontSize:10,color:t.textMuted,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5,fontFamily:'Plus Jakarta Sans'};
  const inS = e => ({width:'100%',background:t.surface,border:`1px solid ${e?t.critical:t.border}`,color:t.text,borderRadius:9,padding:'11px 12px',fontSize:13.5,fontFamily:'DM Sans',outline:'none',transition:'border-color .2s'});
  const errS={display:'block',fontSize:11,color:t.critical,marginTop:5,fontFamily:'DM Sans'};
  const field = (key,label,kind) => {
    const e=err[key];
    return (
      <div>
        <label htmlFor={'lead-'+key} style={lab}>{label}</label>
        {kind==='select'
          ? <select id={'lead-'+key} value={f[key]} onChange={set(key)} aria-invalid={!!e} aria-describedby={e?'lead-'+key+'-e':undefined} style={{...inS(e),cursor:'pointer'}}>
              <option value="">{L('Selecciona…','Select…')}</option>
              {interests.map(([k,l])=><option key={k} value={k}>{l}</option>)}
            </select>

/* ═══════════════════════════════════════════════════════════
