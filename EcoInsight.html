function EcoRegulations({ t, lang }) {
  const L = window.makeL(lang);
  const bp = window.useBreakpoint();
  const Reveal = window.Reveal;
  const PROJECTS = window.REG_PROJECTS, FACTORS = window.REG_FACTORS, LAWS = window.REG_LAWS, CATS = window.REG_CATS;

  const SAVE = 'ei_reg_v1';
  const saved = (() => { try { return JSON.parse(localStorage.getItem(SAVE) || '{}'); } catch(e){ return {}; } })();
  const [proj, setProj] = React.useState(saved.proj || null);
  const [factors, setFactors] = React.useState(saved.factors || {});
  React.useEffect(() => { try { localStorage.setItem(SAVE, JSON.stringify({proj, factors})); } catch(e){} }, [proj, factors]);

  const toggleFactor = id => setFactors(p => ({ ...p, [id]: !p[id] }));

  // compute applicable laws (union of project base + active factor laws), deduped
  const lawIds = React.useMemo(() => {
    if (!proj) return [];
    const p = PROJECTS.find(x => x.id === proj);
    const ids = [...(p ? p.base : [])];
    FACTORS.forEach(f => { if (factors[f.id]) f.laws.forEach(l => ids.push(l)); });
    return [...new Set(ids)];
  }, [proj, factors]);

  // group by category in a stable order
  const grouped = React.useMemo(() => {
    const order = Object.keys(CATS);
    const g = {};
    lawIds.forEach(id => { const law = LAWS[id]; if (!law) return; (g[law.cat] = g[law.cat] || []).push(id); });
    return order.filter(c => g[c]).map(c => [c, g[c]]);

  const selProj = proj ? PROJECTS.find(x => x.id === proj) : null;

          </div>
        </Reveal>

        {/* STEP 1 — project selector (menu of cards) */}
        <Reveal>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
            <span style={{width:24,height:24,borderRadius:7,background:t.accent,color:t.ctaText,fontSize:13,fontWeight:800,fontFamily:'Plus Jakarta Sans',display:'flex',alignItems:'center',justifyContent:'center'}}>1</span>
            <span style={{fontSize:13,fontWeight:700,color:t.text,fontFamily:'Plus Jakarta Sans',textTransform:'uppercase',letterSpacing:'.06em'}}>{L('Tipo de proyecto','Project type')}</span>

          <div style={{display:'grid',gridTemplateColumns:bp!=='sm'?'repeat(4,1fr)':'repeat(2,1fr)',gap:12,marginBottom:38}}>

                  onMouseEnter={e=>{ if(!on){ e.currentTarget.style.borderColor=t.borderStrong; e.currentTarget.style.transform='translateY(-2px)'; } }}

          <div style={{display:'flex',flexWrap:'wrap',gap:9,marginBottom:46}}>

                  <span style={{width:15,height:15,borderRadius:5,border:`1.5px solid ${on?t.accent:t.borderStrong}`,background:on?t.accent:'transparent',color:t.ctaText,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,transition:'all .2s'}}>{on?'✓':''}</span>
                  {f.label[lang]}
                </button>
              );
            })}
          </div>
        </Reveal>

        {/* RESULT */}
        {!proj ? (
          <Reveal>
            <div style={{textAlign:'center',padding:'56px 24px',border:`1.5px dashed ${t.border}`,borderRadius:18,color:t.textMuted}}>

              <p style={{fontSize:15,fontFamily:'DM Sans'}}>{L('Selecciona un tipo de proyecto para ver la normativa aplicable.','Select a project type to see the applicable regulation.')}</p>
            </div>

          <div key={proj + Object.keys(factors).filter(k=>factors[k]).join('-')}>

                  <span style={{fontSize:15,color:t.textMuted,fontFamily:'DM Sans'}}>{L('normativas','regulations')}</span>

                <div style={{height:34,width:1,background:t.border}}/>

                  <div style={{fontSize:11,color:t.textFaint,fontFamily:'Plus Jakarta Sans',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em'}}>{L('Proyecto','Project')}</div>

            {/* grouped law cards */}
            {grouped.map(([cat, ids], gi) => {

              return (

                    <span style={{flex:1,height:1,background:t.border}}/>

                          style={{display:'block',textDecoration:'none',background:t.card,border:`1px solid ${t.border}`,borderLeft:`3px solid ${meta.color}`,borderRadius:13,padding:'18px 20px',transition:'all .24s cubic-bezier(.16,1,.3,1)',animation:'slideUp .55s ease-out both',animationDelay:`${0.18+gi*0.07+ci*0.05}s`}}

/* ═══════════════════════════════════════════════════════════
   EcoInsight · APP SHELL — context, hash router, intro gating
   ═══════════════════════════════════════════════════════════ */
function parseHash() {
  const h = (location.hash||'').replace(/^#\/?/,'');
  const m = h.match(/^noticia\/(\d+)/);
  if (m) return {name:'article', id:parseInt(m[1],10)};
  if (h.startsWith('reporte')) return {name:'report'};
  if (h.startsWith('calculadora')) return {name:'calculator'};
  if (h.startsWith('normativa')) return {name:'regulations'};
  return {name:'home'};
}

function App() {
  const [theme, setTheme] = React.useState(() => localStorage.getItem('ei_theme') || 'navy');
  const [lang, setLang] = React.useState(() => localStorage.getItem('ei_lang') || 'es');
  const [route, setRoute] = React.useState(() => {
    const r = parseHash();
    return r.name==='report' ? {name:'home'} : r;   // report needs live data; ignore on cold load
  });
  const [reportData, setReportData] = React.useState(null);
  const [intro, setIntro] = React.useState(() => {
    try { return sessionStorage.getItem('ei_intro_seen') !== '1'; } catch(e){ return true; }
  });
  const t = window.THEMES[theme] || window.THEMES.navy;

  React.useEffect(()=>{ localStorage.setItem('ei_theme',theme); document.body.style.background=t.bg; document.body.style.color=t.text; document.body.style.setProperty('--ei-accent',t.accent); },[theme,t]);
  React.useEffect(()=>{ localStorage.setItem('ei_lang',lang); document.documentElement.lang=lang; },[lang]);

  const go = React.useCallback((name, arg) => {
    if (name==='article') {
      setRoute({name:'article', id:arg});
      history.pushState(null,'',`#/noticia/${arg}`);
      window.scrollTo(0,0);
    } else if (name==='report') {
      setReportData(arg);
      setRoute({name:'report'});
      history.pushState(null,'',`#/reporte`);
      window.scrollTo(0,0);
    } else if (name==='calculator' || name==='regulations') {
      setRoute({name});
      history.pushState(null,'',name==='calculator'?'#/calculadora':'#/normativa');
      window.scrollTo(0,0);
    } else {
      setRoute({name:'home'});
      if (location.hash) history.pushState(null,'','#top');
      if (arg) setTimeout(()=>{ const el=document.querySelector(arg); el&&el.scrollIntoView({behavior:'smooth',block:'start'}); }, 60);
    }
  }, []);

  // browser back/forward
  React.useEffect(()=>{
    const onPop = () => {
      const r = parseHash();
      if (r.name==='report' && !reportData) { setRoute({name:'home'}); return; }
      setRoute(r);
      window.scrollTo(0,0);
    };
    window.addEventListener('popstate', onPop);
    return ()=>window.removeEventListener('popstate', onPop);
  }, [reportData]);

  const base = {background:t.bg,color:t.text,minHeight:'100vh',fontFamily:'DM Sans,sans-serif',transition:'background .35s,color .25s'};

  return (
    <React.Fragment>
      {intro && <window.EcoIntro lang={lang} onDone={()=>setIntro(false)}/>}
      <div style={base}>
        <a className="ei-skip" href="#main">{lang==='en'?'Skip to content':'Saltar al contenido'}</a>
        <window.EcoScrollProgress t={t}/>
        <window.EcoHeader t={t} theme={theme} setTheme={setTheme} lang={lang} setLang={setLang} go={go}/>
        <main id="main">
        {route.name==='home' && (
          <React.Fragment>
            <window.EcoHero t={t} lang={lang} go={go}/>
            <window.EcoNews t={t} lang={lang} go={go}/>
            <window.EcoSolutions t={t} lang={lang} go={go}/>
            <window.EcoMarketplace t={t} lang={lang}/>
            <window.EcoConversion t={t} lang={lang}/>
          </React.Fragment>
        )}
        {route.name==='calculator' && <window.EcoCalculator t={t} lang={lang} go={go}/>}
        {route.name==='regulations' && <window.EcoRegulations t={t} lang={lang}/>}
        {route.name==='article' && <window.EcoArticle t={t} lang={lang} id={route.id} go={go}/>}
        {route.name==='report' && <window.EcoReport t={t} lang={lang} data={reportData} go={go}/>}
        </main>
        <window.EcoFooter t={t} lang={lang}/>
        <window.EcoBackToTop t={t} lang={lang}/>
        <window.EcoWhatsApp t={t} lang={lang}/>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
</body>
</html>
